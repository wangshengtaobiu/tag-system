# =============================================================================
# Tagger Configuration
# =============================================================================

# ---- Embedding Model ----
embedding:
  model: "bge-large-zh-v1.5"
  dim: 1024
  max_seq_length: 512
  batch_size: 32
  vram_mb: 1300

# ---- Reranking Model (optional) ----
reranking:
  model: "Qwen/Qwen2.5-8B-Instruct"
  quantization: "4bit"
  compute_dtype: "float16"
  double_quant: true
  max_seq_length: 4096
  batch_size: 4
  vram_mb: 5500

# ---- Hardware ----
hardware:
  device: "cuda"          # cuda | cpu
  vram_budget_mb: 8000    # RTX 3060 Ti
  total_vram_usage_mb: 7300  # embedding + reranking + overhead

# ---- Retrieval ----
retrieval:
  top_k_candidates: 50      # BGE pre-filter
  top_k_final: 10           # After reranking

  # Text chunking
  chunk_size: 512
  chunk_overlap: 50
  max_context_chunks: 3     # Top chunks for reranking

  # Embedding text length
  max_embedding_chars: 500
  min_embedding_chars: 50
  target_embedding_chars: 150

  # Index type
  index_type: "faiss_flat"  # faiss_flat | faiss_ivf | faiss_ivfpq

  # Facet pre-filtering
  primary_facets:
    - namespace
    - category
    - semantic_type
